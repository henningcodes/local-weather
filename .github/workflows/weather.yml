name: weather

on:
  schedule:
    # 01:53 UTC = 3:53 lokal (Sommer) / 2:53 lokal (Winter) — nach 00Z-Lauf
    # 13:53 UTC = 15:53 lokal (Sommer) / 14:53 lokal (Winter) — nach 12Z-Lauf
    - cron: "53 1,13 * * *"
  workflow_dispatch:        # manueller Trigger über die Actions-UI
  push:
    branches: [main]        # bei jedem Push auf main auch neu bauen

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build site
        run: uv run python make_html.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
